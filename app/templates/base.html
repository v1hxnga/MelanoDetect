<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MelanoDetect AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
</head>
<body>
  {% if session.get("user_role") %}
  <header class="site-header" id="siteHeader">
    <div class="nav-shell">
      <a href="{{ url_for('dashboard_page') }}" class="brand-wrap">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="MelanoDetect Logo" class="brand-logo">
        <div>
          <div class="brand-title">MelanoDetect</div>
          <div class="brand-sub">AI Skin Lesion Screening</div>
        </div>
      </a>

      <nav class="main-nav">
        <a class="{% if active_page == 'profile' %}active{% endif %}" href="{{ url_for('profile_page') }}">Profile</a>
        <a class="{% if active_page == 'upload' %}active{% endif %}" href="{{ url_for('upload_page') }}">Upload</a>
        <a class="{% if active_page == 'results' %}active{% endif %}" href="{{ url_for('results_page') }}">Results</a>
        <a class="{% if active_page == 'history' %}active{% endif %}" href="{{ url_for('history_page') }}">History</a>
        <a class="logout-link" href="{{ url_for('logout') }}">Logout</a>
      </nav>
    </div>
  </header>
  {% endif %}

  <main class="{% if session.get('user_role') %}page-shell{% else %}auth-shell{% endif %}">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="{{ url_for('static', filename='js/site.js') }}"></script>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <script>
        document.addEventListener("DOMContentLoaded", function () {
          {% for category, message in messages %}
            Swal.fire({
              icon: "{{ 'success' if category == 'success' else 'error' }}",
              title: "{{ 'Success' if category == 'success' else 'Error' }}",
              text: "{{ message }}",
              confirmButtonColor: "#4a74f3"
            });
          {% endfor %}
        });
      </script>
    {% endif %}
  {% endwith %}
</body>
</html>
