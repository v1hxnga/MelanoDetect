<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MelanoDetect AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#0F172A] via-[#1E293B] to-[#0F172A] text-white">

  {% if session.get("user_role") %}
  <header class="w-full backdrop-blur-lg bg-white/5 border-b border-white/10">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="text-2xl font-bold text-cyan-300">MelanoDetect AI</div>

      <div class="flex gap-6 items-center text-sm md:text-base">
        <a href="{{ url_for('upload_page') }}" class="text-cyan-300 hover:text-white">Upload</a>
        <a href="{{ url_for('results_page') }}" class="text-cyan-300 hover:text-white">Results</a>
        {% if session.get("user_role") == "Admin" %}
        <a href="{{ url_for('admin_page') }}" class="text-purple-300 hover:text-white">Admin Dashboard</a>
        {% endif %}
        <a href="{{ url_for('logout') }}" class="text-gray-300 hover:text-white">Logout</a>
      </div>
    </div>
  </header>
  {% endif %}

  <main class="max-w-7xl mx-auto px-6 py-10">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
