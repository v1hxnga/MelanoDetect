{% extends "base.html" %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
  <div class="w-full max-w-md">

    <div class="bg-white/5 backdrop-blur-xl border border-white/10 p-8 rounded-2xl shadow-2xl">
      <h2 class="text-4xl font-bold text-white mb-2 text-center">Secure Login</h2>
      <p class="text-gray-300 text-center mb-6">AI-Powered Skin Cancer Detection</p>

      <div class="bg-yellow-500/10 border border-yellow-400/50 p-4 rounded-lg mb-6 flex gap-3">
        <span class="text-yellow-300">⚠️</span>
        <p class="text-sm text-yellow-100">
          <strong>Important:</strong> This is NOT a diagnosis tool. Always consult a qualified dermatologist.
        </p>
      </div>

      <form action="{{ url_for('login') }}" method="POST" class="space-y-4">
        <div>
          <label class="text-gray-200 text-sm">Role</label>
          <select name="role" class="w-full p-3 rounded-lg bg-slate-800 text-white border border-white/10">
            <option>Patient</option>
            <option>Doctor</option>
            <option>Admin</option>
          </select>
        </div>

        <div>
          <label class="text-gray-200 text-sm">Email</label>
          <input type="email" name="email" required placeholder="your.email@example.com"
                 class="w-full p-3 rounded-lg bg-slate-800 text-white border border-white/10"/>
        </div>

        <div>
          <label class="text-gray-200 text-sm">Password</label>
          <input type="password" name="password" required placeholder="Enter password"
                 class="w-full p-3 rounded-lg bg-slate-800 text-white border border-white/10"/>
        </div>

        <button class="w-full bg-gradient-to-r from-cyan-500 to-blue-500 text-white py-3 rounded-lg font-semibold">
          Login
        </button>
      </form>

      <p class="text-gray-400 text-xs text-center mt-6">
        Secure encrypted connection. Your privacy is protected.
      </p>
    </div>
  </div>
</div>
{% endblock %}
